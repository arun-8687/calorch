# Calorch — Azure Container Apps (Consumption) deployment
#
# Cheapest production-grade path. ~$0 idle, ~$0.000012/vCPU-sec when running.
# Run weekly for 5 min, 1k events ≈ <$1/mo. No 10-min timeout (unlike Functions).
#
# Prerequisites (one-time):
#   az extension add --name containerapp
#   az provider register --namespace Microsoft.App
#   az provider register --namespace Microsoft.OperationalInsights
#
# Required env vars (set in deploy.ps1 or as GitHub Actions secrets):
#   AZ_RESOURCE_GROUP   e.g. rg-calorch-prod
#   AZ_LOCATION         e.g. eastus
#   ACR_NAME            e.g. acrcalorchprod   (Azure Container Registry, Basic ~$5/mo)
#   ACA_ENV             e.g. cae-calorch-prod (Container Apps Environment)
#   COSMOS_ENDPOINT     from 'az cosmosdb show'
#   COSMOS_KEY          from 'az cosmosdb keys list'
#   AZURE_OPENAI_*      endpoint, key, deployment, api-version
#   GRAPH_*             tenant/client/secret/user_id
#   ONEDRIVE_DRIVE_ID
#   SEC_USER_AGENT      "Your Name you@example.com"  (SEC requires real contact)
#   CHECKPOINT_POSTGRES_URI  PostgreSQL connection string for LangGraph checkpoints
#   CALORCH_API_KEY      random secret used for X-Calorch-API-Key
#
# Quick deploy (interactive):
#   .\deploy\deploy.ps1

apiVersion: 2023-05-01
location: ${AZ_LOCATION}
identity:
  type: SystemAssigned
properties:
  managedEnvironmentId: /subscriptions/${AZ_SUBSCRIPTION_ID}/resourceGroups/${AZ_RESOURCE_GROUP}/providers/Microsoft.App/managedEnvironments/${ACA_ENV}
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 8000
      transport: auto
      allowInsecure: false
    registries:
      - server: ${ACR_NAME}.azurecr.io
        identity: system
    secrets:
      - name: cosmos-key
        value: ${COSMOS_KEY}
      - name: azure-openai-key
        value: ${AZURE_OPENAI_API_KEY}
      - name: graph-client-secret
        value: ${GRAPH_CLIENT_SECRET}
      - name: checkpoint-postgres-uri
        value: ${CHECKPOINT_POSTGRES_URI}
      - name: calorch-api-key
        value: ${CALORCH_API_KEY}
  template:
    containers:
      - name: calorch
        image: ${ACR_NAME}.azurecr.io/calorch:latest
        resources:
          cpu: 1.0
          memory: 2.0Gi
        env:
          - name: USE_MOCKS
            value: "false"
          - name: REPO_BACKEND
            value: "cosmos"
          - name: COSMOS_ENDPOINT
            value: ${COSMOS_ENDPOINT}
          - name: COSMOS_KEY
            secretRef: cosmos-key
          - name: COSMOS_DB
            value: "calorch"
          - name: COSMOS_CONTAINER
            value: "events"
          - name: AZURE_OPENAI_API_KEY
            secretRef: azure-openai-key
          - name: AZURE_OPENAI_ENDPOINT
            value: ${AZURE_OPENAI_ENDPOINT}
          - name: AZURE_OPENAI_DEPLOYMENT
            value: ${AZURE_OPENAI_DEPLOYMENT}
          - name: AZURE_OPENAI_API_VERSION
            value: "2024-08-01-preview"
          - name: GRAPH_TENANT_ID
            value: ${GRAPH_TENANT_ID}
          - name: GRAPH_CLIENT_ID
            value: ${GRAPH_CLIENT_ID}
          - name: GRAPH_CLIENT_SECRET
            secretRef: graph-client-secret
          - name: GRAPH_USER_ID
            value: ${GRAPH_USER_ID}
          - name: ONEDRIVE_DRIVE_ID
            value: ${ONEDRIVE_DRIVE_ID}
          - name: SEC_USER_AGENT
            value: ${SEC_USER_AGENT}
          - name: CHECKPOINT_POSTGRES_URI
            secretRef: checkpoint-postgres-uri
          - name: CALORCH_API_KEY
            secretRef: calorch-api-key
          - name: SEC_CACHE_DIR
            value: "/data/sec-cache"
          - name: SEC_WATCHLIST
            value: "AAPL,MSFT,NVDA,GOOGL,AMZN,META,AVGO,JPM,TSLA,WMT"
          - name: LANGSMITH_TRACING
            value: "true"
          - name: LANGSMITH_API_KEY
            value: ${LANGSMITH_API_KEY}
          - name: LANGSMITH_PROJECT
            value: "calorch-prod"
        volumeMounts:
          - name: sec-cache
            mountPath: /data
    scale:
      minReplicas: 0          # scale to zero, ~$0 idle
      maxReplicas: 3
      rules:
        - name: weekly-cron
          type: cron
          metadata:
            azFunctionScheduler: {"triggerType": "Schedule", "cronExpression": "0 6 * * MON"}
            functionAppName: "calorch-scheduler"
    volumes:
      - name: sec-cache
        storageType: EmptyDir     # ephemeral, OK for read-through cache
