name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff pytest
      - name: Lint (ruff)
        run: ruff check src tests function_app.py scripts
      - name: Tests
        run: python -m pytest tests/ -q
      - name: Wheel packaging check (templates + seed data must ship)
        run: |
          pip install build
          python -m build --wheel -o /tmp/wheel -q
          python - <<'EOF'
          import glob, zipfile
          names = zipfile.ZipFile(glob.glob("/tmp/wheel/*.whl")[0]).namelist()
          assert sum("data/templates" in n for n in names) == 8, "templates missing from wheel"
          assert any("seed_events" in n for n in names), "seed data missing from wheel"
          print("wheel contents OK")
          EOF
